<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spökhus</title>
    <script type="module" src="js/house.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>

    </header>
    <div id="heading"></div>
    <a href="index.html" class="backLink">Tillbaka till startsidan</a>
    <section id="houseContainer">

    </section>
    <div id="validateBox"></div>
    <section id="booking">
        <form id="bookingForm">
            <h2>Bokningsformulär</h2>
            <fieldset>
                <legend>Antal dagar</legend>

                <label for="checkIn">Incheckningsdatum:</label>
                <input type="date" name="checkIn" id="checkIn">
                
                <label for="numberOfDays">Antal nätter:</label>
                <input type="number" name="numberOfDays" id="numberOfDays" min="1" value="1">
            </fieldset>
            <fieldset>
                <legend>Tillägg</legend>
                <div class="checkbox-item">
                    <input type="checkbox" name="breakfast" id="breakfast" value="150">
                    <label for="breakfast">Frukost 150 kr/dag</label>
                </div>

                <div class="checkbox-item">
                    <input type="checkbox" name="ghostTours" id="ghostTours" value="300">
                    <label for="ghostTours">Spökvandring 300kr</label>
                </div>

                <div class="checkbox-item">
                    <input type="checkbox" name="chargingPole" id="chargingPole" value="200">
                    <label for="chargingPole">Laddstolpe 200kr</label>
                </div>
            </fieldset>
            <fieldset>
                <legend>Rabattkod</legend>

                <input type="text" name="discountCode" id="discountCode" placeholder="Ev. rabattkod här">
            </fieldset>
            <button type="submit" id="bookingBtn">BOKA</button>
        </form>
        <div id="currentBooking">
            <h3>Aktuell bokning:</h3>
        </div>
    </section>
    <div id="bookingConfirmation">

    </div>
    <footer>
    </footer>
</body>

</html>
